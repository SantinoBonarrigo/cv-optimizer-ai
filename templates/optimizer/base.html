{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CV Optimizer{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{% url 'home' %}" class="logo">CV Optimizer</a>
      <nav>
        <a href="{% url 'home' %}">Analyze CV</a>
        <a href="{% url 'history' %}">History</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      Powered by <strong>Groq</strong> + <strong>LLaMA 3.3 70B</strong>
    </div>
  </footer>
</body>
</html>
